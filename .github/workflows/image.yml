name: fedora44-ai image

on:
  push:
    tags:
      - "20*.*.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag. Empty uses YYYY.M.D."
        required: false
        default: ""
      push_latest:
        description: "Also publish :latest"
        required: true
        type: boolean
        default: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: docker.io/safrano9999/fedora44-ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout shared scripts
        uses: actions/checkout@v4
        with:
          repository: safrano9999/SCRIPTS
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
          path: shared-scripts

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.image_tag }}"
            [ -n "$version" ] || version="$(date +%Y.%-m.%-d)"
          fi
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${version}"
            if [ "${{ github.event_name == 'push' || inputs.push_latest }}" = "true" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stage source repositories
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
          SHARED_SCRIPTS_DIR: ${{ github.workspace }}/shared-scripts
        run: |
          gh auth setup-git
          ./setup.sh --no-config --no-build

      - name: Resolve image build configuration
        id: build
        shell: bash
        run: |
          set -euo pipefail
          build_conf="build.conf"
          [ -f "$build_conf" ] || build_conf="fedora.build.conf_example"
          set -a
          . "./$build_conf"
          set +a
          for name in CERTS ELECTRUM_VERSION LND_VERSION GETH_VERSION GETH_COMMIT WEBHOOK_VERSION; do
            [ -n "${!name:-}" ] || { echo "Missing $name" >&2; exit 1; }
          done
          {
            echo "certs=$CERTS"
            echo "electrum_version=$ELECTRUM_VERSION"
            echo "lnd_version=$LND_VERSION"
            echo "geth_version=$GETH_VERSION"
            echo "geth_commit=$GETH_COMMIT"
            echo "webhook_version=$WEBHOOK_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            CERTS=${{ steps.build.outputs.certs }}
            ELECTRUM_VERSION=${{ steps.build.outputs.electrum_version }}
            LND_VERSION=${{ steps.build.outputs.lnd_version }}
            GETH_VERSION=${{ steps.build.outputs.geth_version }}
            GETH_COMMIT=${{ steps.build.outputs.geth_commit }}
            WEBHOOK_VERSION=${{ steps.build.outputs.webhook_version }}
