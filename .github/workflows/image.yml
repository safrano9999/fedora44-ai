name: fedora44-ai image

on:
  push:
    tags:
      - "20*.*.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag. Empty uses YYYY.M.D."
        required: false
        default: ""
      push_latest:
        description: "Also publish :latest"
        required: true
        type: boolean
        default: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: docker.io/safrano9999/fedora44-ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout shared scripts
        uses: actions/checkout@v4
        with:
          repository: safrano9999/SCRIPTS
          token: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
          path: shared-scripts

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.image_tag }}"
            [ -n "$version" ] || version="$(date +%Y.%-m.%-d)"
          fi
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${version}"
            if [ "${{ github.event_name == 'push' || inputs.push_latest }}" = "true" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stage source repositories
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
          SHARED_SCRIPTS_DIR: ${{ github.workspace }}/shared-scripts
        run: |
          gh auth setup-git
          ./setup.sh --no-config --no-build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
